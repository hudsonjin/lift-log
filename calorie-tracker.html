<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Calorie Tracker</h1>

  <div id="day-tabs"></div>

  <div id="add-buttons">
    <button id="add-meal-button">Add Meal</button>
    <button id="add-snack-button">Add Snack</button>
  </div>

  <div id="new-entry-form-container"></div>

  <div id="entries-container"></div>

  <div id="dev-mode-section">
    <input type="password" id="dev-passkey-input" placeholder="Developer passkey">
    <button id="dev-unlock-button">Unlock Developer Mode</button>
    <span id="dev-mode-status"></span>
  </div>

  <script>
    const STORAGE_DAYS_KEY = 'calorieTrackerDays';
    const STORAGE_DATA_KEY = 'calorieTrackerData';

    function getTodayLabel() {
      const today = new Date();
      return today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function loadDays() {
      const stored = localStorage.getItem(STORAGE_DAYS_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    function saveDays(days) {
      localStorage.setItem(STORAGE_DAYS_KEY, JSON.stringify(days));
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_DATA_KEY);
      return stored ? JSON.parse(stored) : {};
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_DATA_KEY, JSON.stringify(data));
    }

    let days = loadDays();
    let calorieData = loadData();
    const todayLabel = getTodayLabel();

    if (!days.includes(todayLabel)) {
      days.push(todayLabel);
      saveDays(days);
    }

    if (!calorieData[todayLabel]) {
      calorieData[todayLabel] = [];
      saveData(calorieData);
    }

    let activeDay = todayLabel;
    let devModeUnlocked = false;

    const dayTabsContainer = document.getElementById('day-tabs');
    const entriesContainer = document.getElementById('entries-container');
    const newEntryFormContainer = document.getElementById('new-entry-form-container');

    function renderTabs() {
      dayTabsContainer.innerHTML = '';
      days.forEach(function (day) {
        const tabButton = document.createElement('button');
        tabButton.textContent = day;
        tabButton.className = 'day-tab-button';
        if (day === activeDay) {
          tabButton.classList.add('active-tab');
        }
        tabButton.addEventListener('click', function () {
          activeDay = day;
          newEntryFormContainer.innerHTML = '';
          renderTabs();
          renderEntries();
        });
        dayTabsContainer.appendChild(tabButton);
      });
    }

    function renderEntries() {
      entriesContainer.innerHTML = '';
      const dayEntries = calorieData[activeDay] || [];

      dayEntries.forEach(function (entry) {
        const row = document.createElement('div');
        row.className = 'entry-row';

        const typeLabel = document.createElement('span');
        typeLabel.textContent = entry.type === 'meal' ? 'Meal' : 'Snack';
        typeLabel.className = 'entry-type-label';
        row.appendChild(typeLabel);

        const fields = [
          { key: 'name', placeholder: 'Name', type: 'text' },
          { key: 'calories', placeholder: 'Calories', type: 'number' },
          { key: 'protein', placeholder: 'Protein (g)', type: 'number' },
          { key: 'carbs', placeholder: 'Carbs (g)', type: 'number' },
          { key: 'fats', placeholder: 'Fats (g)', type: 'number' }
        ];

        fields.forEach(function (field) {
          const input = document.createElement('input');
          input.type = field.type;
          input.placeholder = field.placeholder;
          input.value = entry[field.key];
          input.addEventListener('input', function () {
            entry[field.key] = input.value;
            saveData(calorieData);
          });
          row.appendChild(input);
        });

        if (devModeUnlocked) {
          const deleteButton = document.createElement('button');
          deleteButton.textContent = 'Delete';
          deleteButton.className = 'delete-entry-button';
          deleteButton.addEventListener('click', function () {
            calorieData[activeDay] = calorieData[activeDay].filter(function (item) {
              return item.id !== entry.id;
            });
            saveData(calorieData);
            renderEntries();
          });
          row.appendChild(deleteButton);
        }

        entriesContainer.appendChild(row);
      });
    }

    function showNewEntryForm(type) {
      newEntryFormContainer.innerHTML = '';

      const form = document.createElement('div');
      form.className = 'entry-row';

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = 'Name';

      const caloriesInput = document.createElement('input');
      caloriesInput.type = 'number';
      caloriesInput.placeholder = 'Calories';

      const proteinInput = document.createElement('input');
      proteinInput.type = 'number';
      proteinInput.placeholder = 'Protein (g)';

      const carbsInput = document.createElement('input');
      carbsInput.type = 'number';
      carbsInput.placeholder = 'Carbs (g)';

      const fatsInput = document.createElement('input');
      fatsInput.type = 'number';
      fatsInput.placeholder = 'Fats (g)';

      const submitButton = document.createElement('button');
      submitButton.textContent = 'Submit';

      submitButton.addEventListener('click', function () {
        if (!nameInput.value || !caloriesInput.value || !proteinInput.value || !carbsInput.value || !fatsInput.value) {
          alert('Please fill out all fields before submitting.');
          return;
        }

        const newEntry = {
          id: Date.now(),
          type: type,
          name: nameInput.value,
          calories: caloriesInput.value,
          protein: proteinInput.value,
          carbs: carbsInput.value,
          fats: fatsInput.value
        };

        if (!calorieData[activeDay]) {
          calorieData[activeDay] = [];
        }
        calorieData[activeDay].push(newEntry);
        saveData(calorieData);

        newEntryFormContainer.innerHTML = '';
        renderEntries();
      });

      form.appendChild(nameInput);
      form.appendChild(caloriesInput);
      form.appendChild(proteinInput);
      form.appendChild(carbsInput);
      form.appendChild(fatsInput);
      form.appendChild(submitButton);

      newEntryFormContainer.appendChild(form);
    }

    document.getElementById('add-meal-button').addEventListener('click', function () {
      showNewEntryForm('meal');
    });

    document.getElementById('add-snack-button').addEventListener('click', function () {
      showNewEntryForm('snack');
    });

    document.getElementById('dev-unlock-button').addEventListener('click', function () {
      const entered = document.getElementById('dev-passkey-input').value;
      const statusText = document.getElementById('dev-mode-status');

      if (entered === 'hudson') {
        devModeUnlocked = true;
        statusText.textContent = 'Developer mode ON';
        renderEntries();
      } else {
        statusText.textContent = 'Incorrect passkey';
      }
    });

    renderTabs();
    renderEntries();
  </script>
</body>
</html>
